name: Run Pytest

# 触发条件：当有人往 main 分支推代码（push）或提 PR 时激活
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. 下载你们仓库的代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 安装 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 安装你们项目所需的依赖包
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest lifelines scikit-survival pandas numpy matplotlib seaborn

    # 4. 一键自动运行测试（就是你在本地敲的那行命令）
    - name: Run Pytest
      run: |
        pytest
